<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>City Lord - 正在连接</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #121212;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      box-sizing: border-box;
      padding: 20px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    p {
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 30px;
      line-height: 1.5;
      max-width: 80%;
    }
    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:active {
      background-color: #2563eb;
    }
    .status {
      margin-top: 40px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="icon">🌍</div>
  <h1 id="title">正在连接服务器...</h1>
  <p id="message">首次加载或网络信号不佳时可能需要稍等片刻，请耐心等待。</p>
  
  <button id="retryBtn" style="display: none;" onclick="retry()">重试连接</button>

  <div class="status" id="timeStatus"></div>

  <script>
    const REMOTE_URL = 'https://cl.4567666.xyz';
    
    // 显示当前时间，证明页面活着
    function updateTime() {
      const now = new Date();
      document.getElementById('timeStatus').textContent = `当前时间: ${now.toLocaleTimeString()}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 尝试重定向到远程URL
    function retry() {
      document.getElementById('title').textContent = '正在重试...';
      document.getElementById('retryBtn').style.display = 'none';
      setTimeout(() => {
        window.location.href = REMOTE_URL;
      }, 300);
    }

    // 页面加载后立即尝试重定向
    setTimeout(() => {
      window.location.href = REMOTE_URL;
      
      // 如果5秒后仍在当前页面，说明跳转失败（网络不通等）
      setTimeout(() => {
        document.getElementById('title').textContent = '网络连接异常';
        document.getElementById('message').textContent = '无法连接到服务器，请检查您的网络设置（移动数据或WIFI）后重试。';
        document.getElementById('retryBtn').style.display = 'block';
      }, 5000);
    }, 500);
  </script>
</body>
</html>
