name: iOS Build

on:
  workflow_dispatch:

env:
  XC_SCHEME: App
  XC_WORKSPACE: city-lord-app/ios/App/App.xcworkspace
  ARCHIVE_PATH: city-lord-app/ios/App/build/App.xcarchive
  EXPORT_DIR: city-lord-app/ios/App/build/export
  BUNDLE_ID: com.citylord.app

jobs:
  build:
    name: Build and Export Signed iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            city-lord-app/package-lock.json

      - name: Install Root Dependencies
        run: npm ci --ignore-scripts

      - name: Install city-lord-app Dependencies
        working-directory: city-lord-app
        run: npm ci --ignore-scripts

      - name: Build Web Assets
        working-directory: city-lord-app
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-ci-build-only"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key-for-ci-build-only"
        run: npm run build

      - name: Sync Capacitor iOS Project
        working-directory: city-lord-app
        run: npx cap sync ios

      - name: Restore GRDB to Package.swift
        working-directory: city-lord-app/ios
        run: bash ./apply-grdb-to-package-swift.sh

      - name: Create App.xcworkspace if missing
        working-directory: city-lord-app/ios/App
        run: |
          set -e
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath .build/SourcePackages || true
          echo "=== Workspace check ==="
          ls -la | grep -E '(xcworkspace|xcodeproj)'
          if [ ! -d "App.xcworkspace" ]; then
            echo "xcworkspace not created, creating manually..."
            mkdir -p App.xcworkspace
            python3 -c "
import os
content = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
<Workspace version = \"1.0\">
  <FileRef location = \"group:App.xcodeproj\" />
  <FileRef location = \"group:CapApp-SPM\" />
</Workspace>
'''
with open('App.xcworkspace/contents.xcworkspacedata', 'w') as f:
    f.write(content)
print('xcworkspace created')
"
          fi
          echo "=== Final workspace contents ==="
          cat App.xcworkspace/contents.xcworkspacedata

      - name: Decode and Install Signing Certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          if [ -z "$IOS_CERTIFICATE_BASE64" ]; then
            echo "ERROR: IOS_CERTIFICATE_BASE64 is empty"
            exit 1
          fi
          if [ -z "$IOS_PROVISION_PROFILE_BASE64" ]; then
            echo "ERROR: IOS_PROVISION_PROFILE_BASE64 is empty"
            exit 1
          fi

          echo "CERT secret length: ${#IOS_CERTIFICATE_BASE64}"
          echo "PROFILE secret length: ${#IOS_PROVISION_PROFILE_BASE64}"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          echo "CERT file size: $(wc -c < $CERTIFICATE_PATH) bytes"
          echo "PROFILE file size: $(wc -c < $PROFILE_PATH) bytes"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(defaults read "$PROFILE_PLIST" UUID 2>/dev/null || \
            /usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          echo "Profile UUID: $PROFILE_UUID"
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Archive iOS App
        working-directory: city-lord-app/ios/App
        run: |
          set -e
          set -o pipefail
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme "$XC_SCHEME" \
            -configuration Release \
            -archivePath "../../build/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$(security find-identity -v -p codesigning | grep 'iPhone Distribution' | head -1 | awk '{print $3}' | tr -d '"')" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -clonedSourcePackagesDirPath .build/SourcePackages \
            2>&1 | tee xcodebuild.log

      - name: Export IPA
        run: |
          set -e
          mkdir -p "$EXPORT_DIR"
          cat > /tmp/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>PLACEHOLDER_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST_EOF
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: citylord-signed-ipa
          path: ${{ env.EXPORT_DIR }}/*.ipa
          retention-days: 7

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: city-lord-app/ios/App/xcodebuild.log
          retention-days: 3

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
