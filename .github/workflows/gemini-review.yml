name: Gemini Retrospective Code Review

on:
  push:
    branches:
      - main
      - master

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Git Diff
        id: get_diff
        run: |
          DIFF_CONTENT=$(git diff HEAD^ HEAD)
          echo "diff_content<<EOF" >> $GITHUB_ENV
          echo "$DIFF_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Call Gemini 1.5 Pro API
        id: gemini_review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const diff = process.env.diff_content;
            if (!diff || diff.length < 10) {
              console.log("无实质性代码变动，跳过审查。");
              return;
            }

            const prompt = `你是一个苛刻的资深架构师。请审查以下 Git Diff 代码。仅在发现逻辑漏洞、内存泄漏、安全隐患或严重性能退化时输出报告。忽略格式问题。输出格式必须为精简的 Markdown 列表，指明文件名、行号及修复指令。\n\n请审查以下差异代码：\n${diff}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${process.env.GEMINI_API_KEY}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [{
                  parts: [{ text: prompt }]
                }],
                generationConfig: {
                  temperature: 0.1
                }
              })
            });

            const result = await response.json();
            
            // 异常处理：确保 API 返回有效结果
            if (!result.candidates || !result.candidates[0].content) {
              console.error("API 调用失败或未返回有效内容", result);
              return;
            }
            
            const reviewText = result.candidates[0].content.parts[0].text;
            
            // 将审查结果回写至该次 Commit 的评论区
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `### 🤖 Gemini 审查报告\n\n${reviewText}`
            });