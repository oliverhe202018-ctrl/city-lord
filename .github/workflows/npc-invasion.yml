name: Ghost NPC Invasion

on:
  schedule:
    # 每 12 小时执行一次 (如 UTC 0:00 与 12:00，北京时间 8:00 与 20:00)
    - cron: '0 */12 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  invade:
    name: Execute Invasion
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NPC Invasion API
        run: |
          curl -X POST "${{ secrets.PRODUCTION_URL }}/api/cron/npc-invasion" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json" \
          -w "\nHTTP Status: %{http_code}\n"
