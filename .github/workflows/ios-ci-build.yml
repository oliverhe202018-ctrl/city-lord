name: iOS CI Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Export iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-key"
          SUPABASE_SERVICE_ROLE_KEY: "dummy-service-key"
        run: npm run build

      - name: Sync Capacitor iOS Project
        run: npx cap sync ios

      - name: Build Unsigned App
        run: |
          cd ios/App
          # Build without code signing
          xcodebuild clean archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          cd ios/App
          # Create a generic Payload folder, copy the .app, and compress to .ipa
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -qr citylord-unsigned.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: citylord-ios-unsigned
          path: ios/App/build/citylord-unsigned.ipa
          retention-days: 7
