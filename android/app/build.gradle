apply plugin: 'com.android.application'

android {
    namespace "com.xiangfei.citylord"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.citylord.game.pro"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10200
        versionName "1.2.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            }
        }
    }

    packagingOptions {
        pickFirst 'META-INF/INDEX.LIST'
        pickFirst 'META-INF/DEPENDENCIES'
        pickFirst 'META-INF/io.netty.versions.properties'
        pickFirst 'META-INF/LICENSE'
        pickFirst 'META-INF/LICENSE.txt'
        pickFirst 'META-INF/NOTICE'
        pickFirst 'META-INF/NOTICE.txt'
        pickFirst 'META-INF/services/io.grpc.LoadBalancerProvider'
        pickFirst 'META-INF/services/io.grpc.NameResolverProvider'
        pickFirst 'META-INF/services/io.grpc.ManagedChannelProvider'
        pickFirst 'META-INF/com.android.tools/r8/from-text.txt'
        pickFirst 'version.txt'
        pickFirst 'google/protobuf/**'
        pickFirst '**/*.proto'
        pickFirst 'META-INF/*.kotlin_module'
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    // Room 2.6+ 要求 Java 8 兼容
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // 高德定位 SDK (GCJ-02 native)
    implementation 'com.amap.api:location:6.4.9'
    // LocalBroadcastManager — Service ↔ Plugin 通信
    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.1.0'

    // ---- Room 离线持久化 (Black Box) ----
    def room_version = '2.6.1'
    implementation "androidx.room:room-runtime:$room_version"
    annotationProcessor "androidx.room:room-compiler:$room_version"
}

configurations.all {
    resolutionStrategy {
        force 'com.google.protobuf:protobuf-javalite:3.21.12'
        force 'com.google.protobuf:protobuf-java:3.21.12'
    }
}

apply from: 'capacitor.build.gradle'

// google-services.json removed
