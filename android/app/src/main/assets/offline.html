<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, sans-serif;
      padding: 32px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 14px; color: #9ca3af; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #fbbf24;
      color: #000;
      border: none;
      border-radius: 24px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>网络连接已断开</h1>
  <p>请检查您的网络设置后重试</p>
  <button onclick="window.location.reload()">重新连接</button>
</body>
</html>
